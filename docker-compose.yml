services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      LIVE_SCORE_BIND_HOST: "${LIVE_SCORE_BIND_HOST:-0.0.0.0}"
      LIVE_SCORE_PORT: "${LIVE_SCORE_PORT:-3101}"
      LIVE_SCORE_GAMESERVER_BASE_URL: "${LIVE_SCORE_GAMESERVER_BASE_URL:-http://10.66.30.100}"
      LIVE_SCORE_SCOREBOARD_PATH: "${LIVE_SCORE_SCOREBOARD_PATH:-/competition/scoreboard.json}"
      LIVE_SCORE_STATUS_PATH: "${LIVE_SCORE_STATUS_PATH:-/competition/status.json}"
      LIVE_SCORE_POLL_INTERVAL_MS: "${LIVE_SCORE_POLL_INTERVAL_MS:-4000}"
      LIVE_SCORE_REQUEST_TIMEOUT_MS: "${LIVE_SCORE_REQUEST_TIMEOUT_MS:-3000}"
      LIVE_SCORE_MAX_EVENTS: "${LIVE_SCORE_MAX_EVENTS:-40}"
      LIVE_SCORE_CORS_ORIGIN: "${LIVE_SCORE_CORS_ORIGIN:-*}"
      LIVE_SCORE_FALLBACK_SCOREBOARD_FILE: "${LIVE_SCORE_FALLBACK_SCOREBOARD_FILE:-/app/samples/scoreboard.json}"
      LIVE_SCORE_FALLBACK_STATUS_FILE: "${LIVE_SCORE_FALLBACK_STATUS_FILE:-/app/samples/status.json}"
    restart: unless-stopped
    expose:
      - "3101"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3101/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${LIVE_SCORE_UI_PORT:-8080}:80"
